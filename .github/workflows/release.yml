name: Release

on:
  push:
    branches:
      - main

concurrency: release-${{ github.ref }}

permissions:
  contents: write       # create tags / push the Version Packages PR branch
  pull-requests: write  # open & update the Version Packages PR
  id-token: write       # npm provenance

jobs:
  # Gate 1 — maintain the "Version Packages" PR. While changesets are pending on
  # main this job opens/updates that PR (versions + CHANGELOGs). Merging the PR is
  # the human approval that a release should happen. No publishing happens here.
  version:
    name: Version (open release PR)
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install

      - name: Create or update the Version Packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          # No publish here — publishing is the separately-gated job below.
          publish: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Decide whether there is actually a new version to publish. `hasChangesets ==
  # false` is true both after the Version PR merges (a real release) AND on any
  # changeset-less push to main (docs/CI, or the first push after enabling this
  # workflow). Without this guard the env-gated publish job below would prompt a
  # reviewer for those no-op pushes too. We only proceed when a package's local
  # version is not yet on the registry — i.e. a genuine pending release.
  check-publish:
    name: Check for unpublished versions
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    outputs:
      shouldPublish: ${{ steps.check.outputs.should }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.10.0"

      - name: Compare local versions against the registry
        id: check
        run: |
          should=false
          for dir in packages/sdk packages/auth; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already on registry — skip"
            else
              echo "$name@$ver NOT on registry — publish needed"
              should=true
            fi
          done
          echo "should=$should" >> "$GITHUB_OUTPUT"

  # Gate 2 — publish. Runs only for a genuine pending release (Version PR merged
  # and a version is not yet on npm). The `npm-publish` Environment carries a
  # required reviewer, so a human must approve in the GitHub UI before anything
  # reaches npm, and we refuse to publish a build that fails the Node-ESM check.
  publish:
    name: Publish to npm
    needs: [version, check-publish]
    if: needs.check-publish.outputs.shouldPublish == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.10.0"
          registry-url: "https://registry.npmjs.org"

      # Hard gate: never publish a dist npm consumers cannot import under Node ESM.
      - name: Verify built packages import under Node ESM
        run: node scripts/verify-esm.mjs

      # `changeset publish` only publishes packages whose version is not yet on
      # the registry, so it is a no-op if there is nothing new to release. It
      # creates a git tag per published package locally; push them so the tags
      # (and any tag-driven release tooling) land on the repo.
      - name: Publish
        run: |
          bun run release
          git push origin --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
