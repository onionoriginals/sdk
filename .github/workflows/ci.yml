name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: ["**"]

jobs:
  typecheck:
    name: Typecheck passes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies (bun)
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies (bun)
        run: bun install

      - name: Lint
        run: bun run lint

  tests:
    name: Tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies (bun)
        run: bun install

      - name: Run tests
        run: bun run test

  coverage:
    name: Coverage meets thresholds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies (bun)
        run: bun install

      - name: Run tests with coverage
        run: bun run test:ci

  esm-importable:
    name: ESM importable (Node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies (bun)
        run: bun install

      - name: Build
        run: bun run build

      # The Bun test suite tolerates extensionless/attribute-less imports, so
      # importing the built dist under Node is the only gate that catches a
      # publish npm consumers cannot actually load.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.10.0"

      - name: Verify built packages import under Node ESM
        run: node scripts/verify-esm.mjs

  changeset:
    name: Changeset present
    # Only on PRs, and skip the bot's "Version Packages" PR (which intentionally
    # has no changesets because it consumes them). Identify that PR by its author
    # — the changesets action opens it as github-actions[bot] via GITHUB_TOKEN —
    # rather than by branch name, which a contributor could spoof to bypass the
    # changeset requirement.
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies (bun)
        run: bun install

      # Fails if the PR adds no changeset. For PRs that genuinely need no release
      # (docs/CI/tests only), add an empty one: `bun run changeset --empty`.
      - name: Require a changeset
        run: bunx changeset status --since=origin/${{ github.base_ref }}
