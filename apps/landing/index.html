<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      %SITE_*% tokens are replaced at build/dev time from src/content.ts by the
      injectSiteMeta plugin in vite.config.ts — copy stays in the single
      content file, and the production URL lives in exactly one constant
      (site.url; placeholder until issue #330 decides the domain).
    -->
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <meta name="theme-color" content="#08090c" />
    <link rel="canonical" href="%SITE_URL%/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%SITE_WORDMARK%" />
    <meta property="og:title" content="%SITE_TITLE%" />
    <meta property="og:description" content="%SITE_DESCRIPTION%" />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:image" content="%SITE_URL%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="%SITE_OG_IMAGE_ALT%" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_TITLE%" />
    <meta name="twitter:description" content="%SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%SITE_URL%/og.png" />
    <meta name="twitter:image:alt" content="%SITE_OG_IMAGE_ALT%" />

    <!-- favicon.ico first so SVG-capable browsers pick the later SVG icon;
         legacy clients fall back to the .ico (also served at /favicon.ico
         for clients that never read link tags). Regenerate both bitmap
         icons from this inline SVG with: bun scripts/icons.mjs -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3E%3Ccircle cx='10' cy='10' r='7.25' fill='none' stroke='%23f7931a' stroke-width='2.5'/%3E%3Ccircle cx='10' cy='10' r='2' fill='%23f4f5f7'/%3E%3C/svg%3E"
    />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>%SITE_TITLE%</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
